name: Deploy vitas
on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VITAS_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519_vitas
          chmod 600 ~/.ssh/id_ed25519_vitas
          ssh-keyscan -H ${{ secrets.VITAS_SERVER_IP }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Rsync code (vendor exclu)
        run: |
          rsync -az --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.env' \
            --exclude='storage' \
            --exclude='vendor' \
            --exclude='node_modules' \
            -e "ssh -i ~/.ssh/id_ed25519_vitas -o StrictHostKeyChecking=no" \
            ./ "${{ secrets.VITAS_SERVER_USER }}"@"${{ secrets.VITAS_SERVER_IP }}":/var/www/vitas

      - name: Deploy sur VPS
        run: |
          ssh -i ~/.ssh/id_ed25519_vitas \
            -o StrictHostKeyChecking=no \
            -o ServerAliveInterval=60 \
            "${{ secrets.VITAS_SERVER_USER }}"@"${{ secrets.VITAS_SERVER_IP }}" << 'ENDSSH'
          set -e
          cd /var/www/vitas

          php artisan down --retry=60 || true

          # Composer uniquement si composer.lock a changé
          NEW_HASH=$(md5sum composer.lock | cut -d' ' -f1)
          OLD_HASH=$(cat .composer_lock_hash 2>/dev/null || echo "none")
          if [ "$NEW_HASH" != "$OLD_HASH" ]; then
            echo "📦 composer.lock modifié — installation des dépendances..."
            composer install --no-dev --no-interaction --optimize-autoloader
            echo "$NEW_HASH" > .composer_lock_hash
          else
            echo "✅ vendor/ à jour — composer ignoré"
          fi

          # Dossiers nécessaires + permissions uniquement là où c'est requis
          mkdir -p storage/app/public storage/framework/cache/data \
                   storage/framework/sessions storage/framework/views \
                   storage/logs bootstrap/cache
          chmod -R 775 storage bootstrap/cache
          touch storage/installed

          php artisan optimize:clear
          php artisan migrate --force
          php artisan storage:link 2>/dev/null || true
          php artisan optimize

          sudo systemctl reload php-fpm || true

          php artisan up
          echo "✅ Déploiement vitas terminé"
          ENDSSH
